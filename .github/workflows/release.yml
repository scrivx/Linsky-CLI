name: Build & Release Go CLI

on:
  push:
    tags:
      - 'v*' # se ejecuta cuando haces git tag v1.0.0

permissions:
  contents: write # necesario para crear releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'

      - name: 🧰 Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 📦 Download dependencies
        run: go mod download

      - name: 🗂️ Create releases directory
        run: mkdir -p releases/${{ github.ref_name }}

      - name: 🏗️ Build Windows
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o releases/${{ github.ref_name }}/urlshortener-cli_windows_amd64.exe ./cmd

      - name: 🏗️ Build Linux
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o releases/${{ github.ref_name }}/urlshortener-cli_linux_amd64 ./cmd

      - name: 🏗️ Build macOS
        run: |
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o releases/${{ github.ref_name }}/urlshortener-cli_darwin_amd64 ./cmd

      - name: 🚀 Create Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          files: releases/${{ github.ref_name }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
